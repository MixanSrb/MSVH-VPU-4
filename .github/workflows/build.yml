name: Build VPU-4

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup C++
      uses: aminya/setup-cpp@v1
      with:
        compiler: gcc

    - name: Build (Linux/macOS)
      if: runner.os != 'Windows'
      run: g++ msvh-vpu-4.cpp -o vpu

    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: g++ msvh-vpu-4.cpp -o vpu.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: vpu-${{ runner.os }}
        path: |
          vpu*
